# Save battery by sleeping after inactivity (30 min by default)
CONFIG_ZMK_SLEEP=y

# Battery state-of-charge reporting. Required for the green battery-level
# indicator LED (CONFIG_DACTYL_BATT_LED) to know the charge level.
CONFIG_ZMK_BATTERY_REPORTING=y

# Uncomment to extend BLE range / power (may reduce battery life)
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# DIAGNOSTIC ONLY — uncomment to make the battery LED blink twice every few
# seconds at boot, ignoring the battery and the split link. Only the right half
# has the LED, so only it self-tests. If the right LED blinks with this on, the
# GPIO/LED wiring is good and the real issue is battery-event delivery on the
# peripheral. Re-comment for normal use.
# CONFIG_DACTYL_BATT_LED_BOOT_SELFTEST=y
